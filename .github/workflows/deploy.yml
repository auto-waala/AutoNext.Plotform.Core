name: Deploy API to Dev and Production

on:
  pull_request:
    types: [closed]
    branches: [ master ]

jobs:
  deploy-dev:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: Development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish API for Development
      run: |
        dotnet publish AutoNext.Plotform.Core.API/AutoNext.Plotform.Core.API.csproj --configuration Release --output ./publish/dev -p:EnvironmentName=Development

    - name: Deploy to Dev Environment via FTP (Preserve Logs)
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/dev/
        server-dir: ${{ secrets.FTP_DEV_PATH }}/
        # Remove dangerous-clean-slate to prevent deletion of logs folder
        # This will only overwrite existing files, not delete extra files

    - name: Ensure logs directory exists on Dev
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/dev/
        server-dir: ${{ secrets.FTP_DEV_PATH }}/logs/
        # This creates empty placeholder to ensure logs folder exists
        # The actual logs folder on server will be preserved

  deploy-production:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: Production
    needs: deploy-dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish API for Production
      run: |
        dotnet publish AutoNext.Plotform.Core.API/AutoNext.Plotform.Core.API.csproj --configuration Release --output ./publish/prod -p:EnvironmentName=Production

    - name: Deploy to Production Environment via FTP (Preserve Logs)
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/prod/
        server-dir: ${{ secrets.FTP_PROD_PATH }}/
        # No dangerous-clean-slate - preserves logs and other non-deployed folders
