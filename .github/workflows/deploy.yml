name: Deploy AccessControl API to Dev and Production

on:
  pull_request:
    types: [closed]
    branches: [ master ]

jobs:
  deploy-dev:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: Development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish AccessControl API for Development
      run: |
        dotnet publish AutoNext.Platform.AccessControl.API/AutoNext.Platform.AccessControl.API.csproj --configuration Release --output ./publish/dev -p:EnvironmentName=Development

    - name: Deploy to Dev Environment via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/dev/
        server-dir: ${{ secrets.FTP_DEV_PATH_ACCESSCONTROL }}/
        port: 21
        timeout: 120000
        retry: 5
        retry-delay: 5000
        log: verbose
        state-name: .ftp-deploy-sync-state-dev-accesscontrol.json

  deploy-production:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: Production
    needs: deploy-dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish AccessControl API for Production
      run: |
        dotnet publish AutoNext.Platform.AccessControl.API/AutoNext.Platform.AccessControl.API.csproj --configuration Release --output ./publish/prod -p:EnvironmentName=Production

    - name: Deploy to Production Environment via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/prod/
        server-dir: ${{ secrets.FTP_PROD_PATH_ACCESSCONTROL }}/
        port: 21
        timeout: 120000
        retry: 5
        retry-delay: 5000
        log: verbose
        state-name: .ftp-deploy-sync-state-prod-accesscontrol.json
